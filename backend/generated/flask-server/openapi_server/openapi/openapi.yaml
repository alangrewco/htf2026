openapi: 3.0.3
info:
  description: "MVP v1 REST API for ACME Inc. to ingest shipping disruption signals,\
    \ enrich relevance and impact, escalate incidents, and generate action proposals\
    \ for manager decisioning."
  title: Shipping Disruption Management API
  version: 1.0.0
servers:
- url: /api/v1
tags:
- name: Reference
- name: Ingestion
- name: Articles
- name: Incidents
- name: Proposals
- name: CompanyConfig
- name: Feedback
paths:
  /articles:
    get:
      operationId: list_articles
      parameters:
      - explode: true
        in: query
        name: state
        required: false
        schema:
          $ref: "#/components/schemas/ArticleProcessingState"
        style: form
      - explode: true
        in: query
        name: relevant
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListResponse"
          description: Paginated articles
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Invalid request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Internal server error
      summary: List articles
      tags:
      - Articles
      x-openapi-router-controller: openapi_server.controllers.articles_controller
  /articles/{article_id}:
    get:
      operationId: get_article
      parameters:
      - explode: false
        in: path
        name: article_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
          description: Article
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Resource not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Internal server error
      summary: Get article by id
      tags:
      - Articles
      x-openapi-router-controller: openapi_server.controllers.articles_controller
  /articles/{article_id}/enrichment:
    get:
      operationId: get_article_enrichment
      parameters:
      - explode: false
        in: path
        name: article_id
        required: true
        schema:
          type: string
        style: simple
      responses:
