          description: Semantic validation failed
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Internal server error
      summary: Update company policy settings
      tags:
      - CompanyConfig
      x-openapi-router-controller: openapi_server.controllers.company_config_controller
