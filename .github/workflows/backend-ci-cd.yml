name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r generated/flask-server/requirements.txt
          pip install pytest flask-testing

      - name: Run backend service tests
        run: pytest -q app/tests

      - name: Run generated controller tests
        run: |
          cd generated/flask-server
          python -m unittest discover -s openapi_server/test -p 'test_*_controller.py' -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write backend .env from secret
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          if [ -z "$BACKEND_ENV_FILE" ]; then
            echo "BACKEND_ENV_FILE secret is empty" >&2
            exit 1
          fi
          printf '%s' "$BACKEND_ENV_FILE" > backend/.env

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
        run: |
          chmod +x backend/scripts/deploy_cloud_run.sh
          backend/scripts/deploy_cloud_run.sh
